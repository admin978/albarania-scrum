name: Build LaTeX report

on:
  push:
    branches: [master]
    paths:
      - "docs/informe/**"
      - ".github/workflows/latex.yml"
  pull_request:
    paths:
      - "docs/informe/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: informe.tex
          working_directory: docs/informe

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: informe-sprint-1
          path: docs/informe/informe.pdf
          if-no-files-found: error
